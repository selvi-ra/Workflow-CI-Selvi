name: MLflow CI

on:
  push:
    branches: [ "main" ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - run: pip install mlflow pandas scikit-learn

    - run: |
        cd MLProject
        mlflow run .

    - uses: actions/upload-artifact@v4
      with:
        name: model
        path: MLProject/mlruns
